# ferret task spec — Dense FP8 GEMM at LARGE M only (M=2048..8192)
# Focus: the 5 shapes where v002 trails DeepGEMM. Small-M shapes already won.

name: fp8-gemm-prefill-large-m
gpu: B200
arch: sm_100a
precision: FP8

problem:
  description: |
    Large-M FP8 block-scaled GEMM for DeepSeek V3 attention projections, TP=8.
    Restricted to the 5 configs where the prior best kernel (v002) trails DeepGEMM:
      o_proj_M2048   (0.76), o_proj_M4096  (0.65), o_proj_M8192  (0.65)
      q_b_proj_M8192 (0.65), kv_b_proj_M8192 (0.93)
    Small-M shapes already beat DeepGEMM by 1.5-3.8x — those are excluded here.

    All shapes have large M (>=2048) and large N (>=3072). The bottleneck is
    sustained MMA throughput + epilogue dequant. Tile shape, pipeline depth,
    and epilogue overhead drive perf.

    Block-scaled FP8 e4m3, BF16 output, FP32 accumulator.
    Block scales: activation 1x128, weight 128x128.

  shapes:
    BATCH: 1

baseline:
  source: "DeepGEMM (deep_gemm.fp8_gemm_nt) — run: python3 baselines/fp8-gemm/baseline_prefill_large_m.py"

references:
  - examples/fp8-gemm/v002_dense_tp8_validated_065.cu
  - examples/fp8-gemm/v015_dense_tp8_tcgen05_prefill.cu
  - examples/fp8-gemm/v007_BROKEN_block_scale_nan.cu
  - resources/deepgemm-2.1.1.post3/deep_gemm/include/deep_gemm/impls/sm100_fp8_gemm_1d2d.cuh
  - resources/cutlass-4.4.2/examples/72_blackwell_narrow_precision_gemm
  - examples/tcgen05-gemm/

configs:
  - name: o_proj_M2048
    args: { M: 2048, K: 2048, N: 7168 }
    target_ratio: 1.00
    weight: 1.0

  - name: q_b_proj_M8192
    args: { M: 8192, K: 1536, N: 3072 }
    target_ratio: 1.00
    weight: 1.0

  - name: kv_b_proj_M8192
    args: { M: 8192, K: 512, N: 4096 }
    target_ratio: 1.00
    weight: 1.0

  - name: o_proj_M4096
    args: { M: 4096, K: 2048, N: 7168 }
    target_ratio: 1.00
    weight: 1.0

  - name: o_proj_M8192
    args: { M: 8192, K: 2048, N: 7168 }
    target_ratio: 1.00
    weight: 1.0

scoring: min_ratio

stage_gate:
  ratio: 0.85
  strict: false

constraints:
  - "Single CUDA stream only."
  - "No CUDA graphs."
  - "cta_group::1 only. 2-CTA clusters are NOT supported on this build."
  - "FP8 e4m3 input, BF16 output, FP32 accumulator."
  - "Block-scaled: activation scale per 1x128 tile, weight scale per 128x128 block."
  - "Output must match a CPU/host reference within max relative error < 1e-2."
  - "MANDATORY OUTPUT VALIDATION: kernel.cu MUST include host reference comparison and emit 'INVALID' for any failing config (parsed as 0.0 TFLOPS). Prior runs reported fake 3-4x wins from kernels that produced NaN — do NOT remove this guard."

hints:
  - "BASELINE IS DEEPGEMM. Read examples/fp8-gemm/v002_dense_tp8_validated_065.cu — it's a verified-correct kernel that already wins at small M but gets 0.65-0.93 of DeepGEMM at the 5 configs in this task. Extend it OR rewrite using DeepGEMM's architecture, your call."
  - "PRIMARY PATH TO MATCH DEEPGEMM: hardware-fused block-scale dequant via 'tcgen05.mma.kind::mxf8f6f4.block_scale'. This eliminates the per-K-iteration epilogue entirely — dequant accumulates inside the MMA pipeline, epilogue runs once per output tile. DeepGEMM's perf at large M comes from this. Without it, the per-K epilogue ceiling is ~0.65-0.70 of DeepGEMM (verified by v002). The MANDATORY validation check (max_rel_err < 1e-2 or emit INVALID) will catch broken block_scale attempts — feel free to attempt it, validation makes it safe."
  - "Block-scale MMA requires UE8M0-format scale matrices in TMEM (not float32). DeepGEMM's resources/deepgemm-2.1.1.post3/deep_gemm/include/deep_gemm/impls/sm100_fp8_gemm_1d1d.cuh shows the SF tensor layout, UTCCP load pattern, and MMA descriptor format. CUTLASS example 72 (resources/cutlass-4.4.2/examples/72_blackwell_narrow_precision_gemm) is a simpler complete reference for the same instruction. Read both — common failure modes are: (i) UE8M0 conversion bug producing NaN, (ii) UTCCP scale layout in TMEM mismatched with what the MMA reads, (iii) missing arrival/wait barrier between scale-load and MMA-issue."
  - "ALTERNATIVE if block_scale fails: per-K-epilogue optimizations on top of v002 — TMA store epilogue, larger BN (192/256) for o_proj (N=7168), dual TMEM load pipelining, more pipeline stages. Combined upside ~0.75-0.80, not enough to fully match DeepGEMM at large M but a real improvement."
  - "examples/fp8-gemm/v007_BROKEN_block_scale_nan.cu shows a previous failed block_scale attempt — kernel produced all-NaN output. Read it as a cautionary example, but the validation check would now catch this immediately."

budget:
  max_iterations: 60
  max_wall_minutes: 120

output:
  result_format: kernel_result_json
  result_keys: [o_proj_M2048, q_b_proj_M8192, kv_b_proj_M8192, o_proj_M4096, o_proj_M8192]
