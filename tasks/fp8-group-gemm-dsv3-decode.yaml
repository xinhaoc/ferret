# ferret task spec — Grouped FP8 GEMM for DeepSeek V3 MoE DECODE

name: fp8-group-gemm-dsv3-decode
gpu: B200
arch: sm_100a
precision: FP8

problem:
  description: |
    Grouped FP8 block-scaled GEMM for DeepSeek V3 MoE, DECODE regime.
    Two grouped GEMMs per MoE layer per token (gate_up + down):
      gate_up: K=7168 → N=4096
      down:    K=2048 → N=7168
    num_experts/rank = 32 (DSv3 EP=8: 256 experts / 8 ranks).

    Decode regime: M_per_expert ∈ {1, 4, 8, 16}. Real per-expert M is small.

    Contiguous layout (DG-compatible):
      A:         [M_total, K]            FP8, rows ordered by expert (contiguous)
      A_scale:   [M_total, K/128]        FP32 (1×128 block scale per row)
      W:         [E, N, K]               FP8 weight per-expert
      W_scale:   [E, N/128, K/128]       FP32 (128×128 block scale)
      m_indices: [M_total]               int32, expert id per row
      Out:       [M_total, N]            BF16

    Block-scaled FP8 e4m3, BF16 output, FP32 accumulator. UE8M0 scales for
    tcgen05.mma.kind::mxf8f6f4.block_scale, OR float32 scales with software
    per-K dequant — both correct, perf may differ.

  shapes:
    NUM_EXPERTS_PER_RANK: 32
    HIDDEN: 7168
    EXPERT_INTERMEDIATE: 2048

  # Structured MPK-format I/O contract (machine-readable interface spec).
  # Contiguous DG-compatible layout; rows of A ordered by expert. Symbolic dims
  # (K/128, N/128, M_total) resolve per-config from args. Mirrors the ASCII block.
  io:
    inputs:
      - { name: A,         shape: [M_total, K],            dtype: fp8_e4m3, layout: k_major }
      - { name: A_scale,   shape: [M_total, "K/128"],      dtype: fp32,     layout: k_major, role: act_scale_1x128 }
      - { name: W,         shape: [E, N, K],               dtype: fp8_e4m3, layout: k_major }   # per-expert weight
      - { name: W_scale,   shape: [E, "N/128", "K/128"],   dtype: fp32,     layout: k_major, role: weight_scale_128x128 }
      - { name: m_indices, shape: [M_total],               dtype: int32,    layout: row_major, role: expert_id_per_row }
    outputs:
      - { name: Out,       shape: [M_total, N],            dtype: bf16,     layout: row_major }

  # K-reduction strategy hint. TODAY the decode group GEMM is SINGLE-PASS-K: one
  # CTA owns one (expert, n_tile) and accumulates the whole K in the tensor-core
  # accumulator, so there is no cross-CTA reduce and no separate reduce task.
  # method=tma_reduce is the PREFERRED upgrade WHERE APPLICABLE: if the agent
  # split-Ks the larger-K group GEMM (gate_up K=7168, down K=2048) to fill idle
  # SMs at small M_per_expert, accumulate the partials with TMA reduction
  # (cp.reduce.async.bulk / tcgen05 TMA store-reduce) rather than naive
  # red.global atomics — generally faster on Blackwell. Keep it INTERNAL (one
  # kernel); do NOT emit a separate reduce task.
  reduce:
    method: tma_reduce
    separate_task: false

baseline:
  source: "DeepGEMM (deep_gemm.m_grouped_fp8_gemm_nt_contiguous, padded layout) — run: python3 baselines/fp8-group-gemm/baseline_dsv3_decode.py"

references:
  - examples/fp8-gemm/v009_large_m_block_scale_mma_080.cu
  - examples/fp8-gemm/v002_dense_tp8_validated_065.cu
  - resources/deepgemm-2.1.1.post3/deep_gemm/include/deep_gemm/impls/sm100_fp8_gemm_1d2d.cuh
  - resources/deepgemm-2.1.1.post3/deep_gemm/include/deep_gemm/impls/sm100_fp8_gemm_1d1d.cuh
  - resources/cutlass-4.4.2/examples/72_blackwell_narrow_precision_gemm

configs:
  # gate_up: K=7168, N=4096
  - name: gate_up_M1
    args: { M_PER_EXPERT: 1, NUM_GROUPS: 32, K: 7168, N: 4096 }
    target_ratio: 1.10
    # Absolute per-call decode-latency goal (μs) the agent iterates TOWARD, in
    # addition to the relative-vs-DeepGEMM bar. INDICATIVE — DeepGEMM is benched
    # live each run; the W13/W2 group GEMM is ~75μs/layer combined today (~1.9×
    # DeepGEMM), so this gate_up call is in the low-30s μs. Scoring folds in
    # min(tflops_ratio, target_us/measured_us), so this only tightens the gate.
    target_latency_us: 30.0
    weight: 1.0

  - name: gate_up_M4
    args: { M_PER_EXPERT: 4, NUM_GROUPS: 32, K: 7168, N: 4096 }
    target_ratio: 1.10
    weight: 1.0

  - name: gate_up_M8
    args: { M_PER_EXPERT: 8, NUM_GROUPS: 32, K: 7168, N: 4096 }
    target_ratio: 1.10
    weight: 1.0

  - name: gate_up_M16
    args: { M_PER_EXPERT: 16, NUM_GROUPS: 32, K: 7168, N: 4096 }
    target_ratio: 1.10
    weight: 1.0

  # down: K=2048, N=7168
  - name: down_M1
    args: { M_PER_EXPERT: 1, NUM_GROUPS: 32, K: 2048, N: 7168 }
    target_ratio: 1.10
    weight: 1.0

  - name: down_M4
    args: { M_PER_EXPERT: 4, NUM_GROUPS: 32, K: 2048, N: 7168 }
    target_ratio: 1.10
    weight: 1.0

  - name: down_M8
    args: { M_PER_EXPERT: 8, NUM_GROUPS: 32, K: 2048, N: 7168 }
    target_ratio: 1.10
    weight: 1.0

  - name: down_M16
    args: { M_PER_EXPERT: 16, NUM_GROUPS: 32, K: 2048, N: 7168 }
    target_ratio: 1.10
    weight: 1.0

scoring: min_ratio

stage_gate:
  ratio: 0.85
  strict: false

constraints:
  - "Single CUDA stream only."
  - "No CUDA graphs."
  - "cta_group::1 only. 2-CTA clusters NOT supported on this build."
  - "FP8 e4m3 input, BF16 output, FP32 accumulator."
  - "Block-scaled: activation scale per 1x128 tile, weight scale per 128x128 block."
  - "TFLOPS measured over REAL FLOPs (2 * M_real * N * K), NOT padded."
  - "Output must match a CPU/host reference within max relative error < 1e-2."
  - "MANDATORY OUTPUT VALIDATION: kernel.cu MUST include host reference comparison and emit 'INVALID' for any failing config (parsed as 0.0 TFLOPS). DO NOT remove this guard."
  - "MANDATORY L2 FLUSH: your kernel benchmark MUST flush a 128 MB buffer (cudaMemset on a 128MB device buffer) immediately before each timed iteration. The DG baseline does this — comparison without matching flush is invalid. In real inference, attention + layernorm + other ops evict L2 between MoE calls; the flush mirrors that. Reported TFLOPS must be median across NI per-iteration measurements (each iteration: flush, record start, kernel launch, record stop, sync), NOT a single batch event-pair around all iterations. Example pattern in DG baseline at baselines/fp8-group-gemm/baseline_dsv3_decode.py."

hints: []

budget:
  max_iterations: 60
  max_wall_minutes: 120

output:
  result_format: kernel_result_json
  result_keys: [gate_up_M1, gate_up_M4, gate_up_M8, gate_up_M16, down_M1, down_M4, down_M8, down_M16]
