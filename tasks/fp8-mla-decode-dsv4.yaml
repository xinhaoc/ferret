# ferret task spec — Sparse FP8 MLA Decode for DeepSeek V4 (MODEL1 layout)

name: fp8-mla-decode-dsv4
gpu: B200
arch: sm_100a
precision: FP8

problem:
  description: |
    Sparse FP8 Multi-head Latent Attention DECODE for DeepSeek V4
    (V3.2 is a DIFFERENT layout — see WARNING below).

    The reference kernel for V4 is FlashMLA
        csrc/sm100/decode/head64/kernel.cuh
    instantiated with **ModelType::MODEL1** (NOT V32). The MODEL1 enum is
    the generic name FlashMLA gave to the V4 layout when open-sourcing
    before V4's public release.

    ── WARNING ──────────────────────────────────────────────────────────
    Do NOT use ModelType::V32. That's DeepSeek V3.2 with different
    dimensions (d_qk=576, 656 bytes/token, 4 scales/token, V_HAVE_ROPE=false).
    V4 (MODEL1) has d_qk=512, 584 bytes/token, 8 scales/token,
    V_HAVE_ROPE=true. See resources/flashmla-main/csrc/sm100/decode/head64/
    config.h for the per-ModelType constants.
    ─────────────────────────────────────────────────────────────────────

    Per V4 paper §2.3.1 (Compressed Sparse Attention, CSA):
      - Token-level compressor: every m=4 KV tokens collapsed to 1
        compressed entry (using Eq 9-12 in paper).
      - Lightning indexer: scores all compressed entries vs query, picks
        top-k. V4-Flash top-k=512, V4-Pro top-k=1024. (This indexer is
        a SEPARATE kernel — DeepGEMM fp8_fp4_paged_mqa_logits — not what
        we're benchmarking here.)
      - Core attention: shared-K/V MQA over (top-k CSA entries + SWA
        window) using a compressed KV entry as BOTH key AND value.
        d_qk = d_v = c = 512 (Eq 18-19, paper §2.3.1).
      - Additional SWA branch: n_win=128 recent uncompressed tokens
        merged into the same attention call (paper §2.3.3).
      - Partial RoPE: last 64 dims of queries / KV entries / output
        (paper §2.3.3, RoPE applied in-place on the last 64 of c=512).

    This task targets ONLY the core attention kernel of CSA, matching
    what vLLM's deepseek_v4_attention.py:898 calls via
    flash_mla_with_kvcache(is_fp8_kvcache=True, indices=...,
    extra_k_cache=..., extra_indices_in_kvcache=...).

  shapes:
    HEAD_DIM_QK: 512
    HEAD_DIM_V:  512
    D_NOPE:      448
    D_ROPE:      64
    NUM_SCALES_PER_TOKEN: 8
    QUANT_TILE_SIZE: 64
    NUM_KV_HEADS: 1            # MQA: one shared K/V head
    V_HAS_ROPE: true           # V uses full 512 dims (including RoPE), unlike V32
    MAIN_PAGE_BLOCK_SIZE: 256  # SWA cache page block
    EXTRA_PAGE_BLOCK_SIZE: 64  # CSA compressed pool page block
    TOPK_MAIN: 128             # SWA window size (n_win=128)
    TOPK_EXTRA_FLASH: 512      # V4-Flash CSA top-k
    TOPK_EXTRA_PRO: 1024       # V4-Pro CSA top-k

baseline:
  source: "FlashMLA flash_mla.flash_mla_with_kvcache(is_fp8_kvcache=True, indices=..., extra_k_cache=..., extra_indices_in_kvcache=...) — run: python3 baselines/fp8-mla-decode-dsv4/baseline_dsv4_decode.py"
  reference_commit: "FlashMLA 7166110 (prepare for open source release, 2026-03-30). Source in resources/flashmla-main/ (identical kernel files). Built copy at /home/xinhaoc/mirage-cuda-agent/resources/flashmla-main/ used by baseline script."

references:
  # FlashMLA reference kernel — instantiated with MODEL1 for V4
  - resources/flashmla-main/csrc/sm100/decode/head64/kernel.cuh
  - resources/flashmla-main/csrc/sm100/decode/head64/config.h
  - resources/flashmla-main/csrc/sm100/decode/head64/instantiations/model1.cu
  - resources/flashmla-main/csrc/api/sparse_decode.h
  - resources/flashmla-main/csrc/params.h
  - resources/flashmla-main/csrc/sm100/helpers.h
  # FP8 KV layout reference (MODEL1_FP8Sparse = V4 layout, NOT V32_FP8Sparse)
  - resources/flashmla-main/tests/quant.py
  # CUTLASS Blackwell tcgen05 FP8 examples
  - resources/cutlass-4.4.2/examples/72_blackwell_narrow_precision_gemm
  # Prior verified FP8 tcgen05 + block_scale work (DSv3 grouped GEMM)
  - examples/fp8-group-gemm/v007_dsv3_decode_verified_105.cu

configs:
  # NARROWED FOCUS: only the two production-shape configs where v033 still
  # underperforms FlashMLA. The four other configs (b2_v4flash, b64_v4flash,
  # b128_v4flash, b2_v4pro) already reach ≥0.97x at v033 and are dropped here
  # to let the agent specialize on the hard ones. v033 is saved at
  # examples/fp8-mla-decode-dsv4/v033_partial_match_785.cu for reference.
  - name: b64_v4pro
    args: { B: 64,  H_Q: 128, S_Q: 2, H_KV: 1, S_KV: 16384, TOPK: 128, EXTRA_S_K: 16384, EXTRA_TOPK: 1024, D_QK: 512, D_V: 512, BLOCK_SIZE: 256, EXTRA_BLOCK_SIZE: 64 }
    target_ratio: 1.20
    weight: 1.0
  - name: b128_v4pro
    args: { B: 128, H_Q: 128, S_Q: 2, H_KV: 1, S_KV: 16384, TOPK: 128, EXTRA_S_K: 16384, EXTRA_TOPK: 1024, D_QK: 512, D_V: 512, BLOCK_SIZE: 256, EXTRA_BLOCK_SIZE: 64 }
    target_ratio: 1.20
    weight: 1.0

scoring: min_ratio

stage_gate:
  ratio: 0.50
  strict: false

constraints:
  - "Your kernel.cu (and any other .cu/.cuh/.h files you commit to workspace/) may NOT #include ANY file from resources/flashmla-main/ — this includes params.h, csrc/sm100/**, csrc/sm90/**, csrc/api/**, csrc/kerutils/** (including kerutils/device/sm100/gemm.cuh which contains FlashMLA's warp-specialized tcgen05 MMA atom wrappers, kerutils/device/sm100/helpers.cuh, kerutils/device/sm100/intrinsics.cuh, and kerutils/device/sm100/tma_cta_group2_nosplit.cuh). You also may NOT link against any compiled FlashMLA object/library. ALLOWED includes: CUTLASS headers from resources/cutlass-4.4.2/include/ (cute/*, cutlass/*), standard CUDA/system headers (cuda.h, cuda_fp8.h, etc.), and files YOU author and commit to the workspace/. If you need the SparseAttnDecodeParams struct (or any other type) define it yourself in kernel.cu or a workspace-local header. All MMA invocations, FP8 dequant, softmax, TMA wrappers, sync primitives, and attention logic must be implemented from CUTLASS atoms or raw inline PTX you write yourself — NOT borrowed from FlashMLA's kerutils. The build command nvcc -I path must NOT include any path under resources/flashmla-main/. Failure → INVALID (parsed as 0.0 TFLOPS, regardless of correctness). Background: the previous attempt complied with the letter of an earlier (looser) version of this rule by avoiding sm100::decode::head64::* directly, but #include'd kerutils/device/sm100/gemm.cuh and used its SM100_MMA_F16BF16_WS_TS_NOELECT struct (which embeds FlashMLA-authored inline PTX 'tcgen05.mma.ws.cta_group::1.kind::f16'). That is using FlashMLA's hand-tuned building blocks as a shortcut. You must use CUTLASS's MMA atoms (e.g. cute::UMMA::SM100_*) or write your own inline PTX directly. Reading FlashMLA source via read_reference() to learn the architecture remains permitted and encouraged — just do not #include or link against it."
  - "Single CUDA stream only."
  - "No CUDA graphs."
  - "cta_group::1 only. 2-CTA clusters NOT supported on this build."
  - "FP8 e4m3 KV cache input, BF16 query/output, FP32 LSE accumulator."
  - "KV cache layout MUST match FlashMLA MODEL1 (V4) format EXACTLY: per-token 584 bytes structured as 448 fp8_e4m3 NoPE + 64 bf16 RoPE + 7 e8m0 scale factors (one per 64-element NoPE chunk) + 1 byte pad. See resources/flashmla-main/tests/quant.py:quantize_k_cache for the MODEL1_FP8Sparse case. DO NOT use the V32 layout (656 bytes/tok, 4 scales) — that's V3.2 and will FAIL correctness against the reference."
  - "Value uses the FULL 512 dims (V_HAVE_ROPE=true in MODEL1, unlike V32 where V uses only the 512 NoPE dims). The same compressed KV entry serves as BOTH attention key and value per V4 paper §2.3.1 Eq 18-19."
  - "Two KV caches required: a MAIN cache (the SWA window, page block size = 256) with `indices` of length topk=128, AND an EXTRA cache (the CSA-compressed pool, page block size = 64) with `extra_indices_in_kvcache` of length extra_topk ∈ {512, 1024}. This dual-cache structure is what vLLM passes (deepseek_v4_attention.py:898). Your kernel must attend to BOTH index sets."
  - "sm_scale = d_qk ** -0.55 (FlashMLA test convention, NOT the standard d_qk^-0.5)."
  - "TFLOPS measured over REAL FLOPs = 2 * H_Q * (B * S_Q * (TOPK + EXTRA_TOPK)) * (D_QK + D_V), the FlashMLA-defined formula in tests/lib.py:count_flop_and_mem_vol_for_decode. Sums attended tokens across BOTH the main and extra index sets. NOT padded."
  - "Output must match a host/GPU reference within max relative error < 1e-2."
  - "MANDATORY OUTPUT VALIDATION: kernel.cu MUST include a reference comparison (CPU reference on a tiny sub-config, OR a slow GPU reference kernel on the same data, OR call FlashMLA via subprocess) and emit 'INVALID' for any failing config (parsed as 0.0 TFLOPS). DO NOT remove this guard."
  - "MANDATORY L2 FLUSH: your kernel benchmark MUST flush a 128 MB buffer (cudaMemset on a 128MB device buffer) immediately before each timed iteration. The FlashMLA baseline does this — comparison without matching flush is invalid. Reported TFLOPS must be median across NI per-iteration measurements (each iteration: flush, record start, kernel launch, record stop, sync), NOT a single batch event-pair around all iterations. Example pattern in baselines/fp8-mla-decode-dsv4/baseline_dsv4_decode.py."
  - "Use tcgen05 MMA. FlashMLA itself uses BF16 MMA on dequantized FP8 KV (config.h: SM100_MMA_F16BF16_WS_*). Hardware FP8 MMA (kind::f8f6f4 or kind::mxf8f6f4.block_scale) is allowed but NOT required to match FlashMLA's compute pattern — the reference does the dequant→BF16 path. See examples/fp8-group-gemm/v007_dsv3_decode_verified_105.cu for a hardware FP8 MMA pattern if you want it."

hints:
  - |
    ARCHITECTURE HINT (specific to closing the gap on b64_v4pro / b128_v4pro):
    Your current v033/v034 kernel uses THREE warpgroups
    (WG0=softmax/epilogue, WG1=MMA/TMA/index, WG2=dequant — 384 threads).
    FlashMLA's reference uses only TWO warpgroups
    (resources/flashmla-main/csrc/sm100/decode/head64/kernel.cuh:134-440 —
    WG0 is the Scale/Exp/softmax/epilogue warpgroup with reg_alloc<224>,
    WG1 contains MMA + TMA + dequant + index loads via warp-level
    specialization, e.g. `if (warp_idx == 4) { MMA warp; }` at line ~433
    inside WG1 dispatches one specific warp to run MMA while the other
    warps handle TMA loads / dequant work). This means FlashMLA's
    dequant→MMA→softmax dependency chain crosses ONE WG boundary per tile
    (WG1→WG0), whereas your kernel crosses TWO (WG2→WG1→WG0). On the
    heavy shapes (b64_v4pro N_att≈1152 with 18 tiles per query, b128_v4pro
    similar) those extra cross-WG barriers compound — your own NCU
    profile flagged "barrier stalls dominate (~9.15 stall ratio)" which
    matches this pattern. CONSIDER: collapse WG2's dequant work into
    WG1 by dispatching dequant to specific warps inside WG1 (e.g. warps
    0-3 for dequant, warp 4 for MMA, warp 5-7 for TMA load + index)
    rather than as its own warpgroup. This matches FlashMLA's
    warp-within-WG specialization pattern at kernel.cuh:135-440. Keep
    your existing MMA atoms, NUM_BUFS=2, B_H=64, B_TOPK=64 — those are
    structurally correct. Only the warpgroup partitioning needs to change.

budget:
  max_iterations: 80
  max_wall_minutes: 240

output:
  result_format: kernel_result_json
  result_keys: [b64_v4pro, b128_v4pro]
