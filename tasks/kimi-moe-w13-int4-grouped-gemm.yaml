# ferret task — Kimi K2.6/K2.7 MoE w13 INT4 Grouped GEMM on B200
#
# Goal: produce a hand-written CUDA kernel that beats vLLM's Marlin MoE
# (fused_marlin_moe / CompressedTensorsWNA16MoEMethod) on the w13 (gate+up)
# projection for Kimi K2.6/K2.7, in the LOW-LATENCY DECODE regime (BS=1,
# speculative decoding with K=8 lookahead, so tokens-per-step T <= 8).

name: kimi-moe-w13-int4-grouped-gemm
gpu: B200
arch: sm_100a
precision: W4A16   # INT4 weights, BF16 activations, FP32 accumulator, BF16 output

problem:
  description: |
    Per-layer MoE gate+up projection for the Kimi K2.6/K2.7 text backbone
    (DeepSeek-V3-style stack, vLLM dispatches as DeepseekV2ForCausalLM).

    Model: Kimi K2.6 / K2.7
      hidden H        = 7168
      MoE intermediate I = 2048  →  2I = 4096 (gate ‖ up concatenated)
      routed experts E   = 384
      top-k Ep        = 8
      MoE layers       = 60 (layer 0 dense, skipped)
      quant: INT4 W4A16, compressed-tensors, group-32, symmetric, no zero-point

    Per-rank dims — TARGETED PARALLELISM = TP=8 × EP=1 ONLY:
      E_loc = 384  (all experts on every rank, no expert parallelism)
      I_r   = 256
      2I_r  = 512  (gate ‖ up concatenated, MMA N-axis after swapAB-on-weight)

    Compute, for each routed token of each local expert e (REQUIRED FUSED PATH):
      gate_up[t, e] = input[t] @ dequant(W13[e])^T       # [2I_r] = [H] · [2I_r, H]^T
      gate = gate_up[:, :I_r]   up = gate_up[:, I_r:]
      out[t, e]     = silu(gate) * up                    # [I_r] — FINAL kernel output

    The silu·mul activation MUST be fused into the kernel epilogue (read
    constraints). The kernel emits [P, I_r] BF16 directly; it does NOT emit
    the [P, 2I_r] intermediate.

    GEMM dims (per expert e):
      M = M_e   tokens routed to expert e, RAGGED, 0..T (T <= 8)
      N = 2I_r = 512  (gate ‖ up, before silu·mul fusion → output is I_r = 256)
      K = H = 7168  fixed

    This is a GROUPED GEMM: one launch, ragged M across E_loc experts (same
    N, K). It is NOT a batched GEMM (batched assumes uniform M). At T<=8
    only <= T·Ep = 64 experts are non-empty; the rest have M_e = 0 and
    must be skipped from the tile schedule.

    Phase in scope: DECODE ONLY, T <= 8. Large-T prefill is NOT a target.
    At T <= 8 this kernel is memory-bound on streaming the INT4 weights
    (~3.67 MB/expert at TP=4EP=2; ~29 MB total per token across 8 active
    experts; ~235 MB at T=8 worst case — exceeds B200's 192 MB L2).

  shapes:
    H:              7168
    I_full:         2048
    2I_full:        4096
    E_global:       384
    top_k:          8

    # Per-rank shapes — TP=8 EP=1 ONLY
    E_loc: 384
    I_r:   256
    2I_r:  512    # gate ‖ up; MMA M-axis after swapAB
    # silu·mul fuses [P, 2I_r=512] → [P, I_r=256] in the epilogue

  weight_layout:
    # Verbatim contract from the compressed-tensors checkpoint (NOT modifiable
    # at runtime, but one-time load-time pre-permutation IS allowed; see
    # constraints).
    description: |
      INT4 weights packed 8 nibbles per int32, K-major (so each int32 holds
      8 consecutive K-dim positions of one output row). Nibble values are
      stored offset-8 unsigned (i.e. the raw nibble 0..15 represents the
      signed value (nibble - 8) in [-8, 7]); the consumer must convert to
      two's-complement signed at decode time.
      Per-expert tensor shape: W13[e] has shape [2I_r, H] with gate-rows
      [:I_r] and up-rows [I_r:] concatenated. After int32 packing along K:
      W13_packed[e] has shape [2I_r, H/8] of int32.
      Scales: bf16, one per [N-row, 32-K-chunk]. Shape
      W13_scales[e] = [2I_r, H/32] bf16. Symmetric (no zero-point).

  math_contract:
    activation_dtype: bf16
    weight_storage_dtype: int4_packed_in_int32
    weight_compute_dtype: bf16   # dequantized on-chip before MMA
    accumulator_dtype: fp32
    output_dtype: bf16
    correctness_oracle: |
      Dequantize INT4 → BF16 using stored group-32 BF16 scales
      (signed_nibble * scale), then BF16 matmul with FP32 accumulator,
      cast result to BF16. Kernel output must equal this within BF16
      rounding (max rel err < 5e-3, max abs err < 1.0 on a normalized
      random-input distribution).

baseline:
  source: "vLLM Marlin MoE. Run: /home/xinhaoc/vllm-venv/bin/python3 baselines/kimi-moe-w13-int4/baseline_marlin.py — calls ops.moe_wna16_marlin_gemm + apply_moe_activation(MoEActivation.SILU) directly to time the w13+silu·mul fused operation in isolation (NOT the full fused_marlin_moe, which also includes w2 down-proj)."
  reference_commit: "vllm 0.20.1 (catalyst /home/xinhaoc/vllm-venv); Marlin permuted INT4 weight layout via gptq_marlin_moe_repack."
  measured_on_b200_jun_2026:
    T1:  { latency_us: 25.60, tflops: 2.29, weight_bw_tbs: 0.57 }
    T8:  { latency_us: 50.21, tflops: 9.36, weight_bw_tbs: 2.34 }
  notes: |
    Marlin is severely overhead-limited at T<=8: T=1 achieves only ~7% of
    B200 HBM peak (0.57 TB/s out of ~8 TB/s). The ~24 us of fixed overhead
    beyond pure weight streaming is the target to beat — a kernel that
    drives weight bandwidth closer to peak can win big at small T.

    ⚠ Marlin has reported breakage on newer Blackwell driver/SM combos
    (vLLM #40357 GB10/SM12.1). On this catalyst B200 + vllm 0.20.1 build,
    Marlin produces finite outputs and the above latencies are reproducible.
    If breakage recurs on a different box, fall back to the vLLM Triton
    moe_wna16 backend and note the substitution in run.log.

references:
  # ── Tier 1: Marlin baseline source — read FIRST. This is the playbook. ─
  # vLLM's Marlin MoE (the kernel baseline_marlin.py invokes):
  - resources/vllm-csrc-marlin/csrc/libtorch_stable/moe/moe_wna16.cu                          # MoE entry point
  - resources/vllm-csrc-marlin/csrc/libtorch_stable/moe/marlin_moe_wna16/marlin_template.h    # MoE-specific Marlin template
  - resources/vllm-csrc-marlin/csrc/libtorch_stable/moe/moe_wna16_utils.h
  # vLLM's underlying non-MoE Marlin — same mainloop, simpler scaffold:
  - resources/vllm-csrc-marlin/csrc/libtorch_stable/quantization/marlin/marlin.cu             # launcher
  - resources/vllm-csrc-marlin/csrc/libtorch_stable/quantization/marlin/marlin.cuh
  - resources/vllm-csrc-marlin/csrc/libtorch_stable/quantization/marlin/marlin_template.h     # inner kernel template
  - resources/vllm-csrc-marlin/csrc/libtorch_stable/quantization/marlin/marlin_mma.h
  - resources/vllm-csrc-marlin/csrc/libtorch_stable/quantization/marlin/marlin_dtypes.cuh     # int4 unpack (lop3+PRMT)
  - resources/vllm-csrc-marlin/csrc/libtorch_stable/quantization/marlin/gptq_marlin_repack.cu # K-tile permutation
  # Original IST-DASLab Marlin — single-file, cleanest reference (SM80/SM90):
  - resources/marlin-standalone/marlin/marlin_cuda_kernel.cu                                  # 822 lines, canonical

  # ── Tier 2: CUTLASS Blackwell GEMM examples — directly relevant ────────
  # The MOST RELEVANT CUTLASS examples for this task (INT4 MoE GEMM on B200):
  - resources/cutlass-4.4.2/examples/92_blackwell_moe_gemm           # ← MoE GEMM on Blackwell — exact shape match
  - resources/cutlass-4.4.2/examples/86_blackwell_mixed_dtype_gemm   # ← INT4-weight × BF16-act with on-chip dequant
  - resources/cutlass-4.4.2/examples/75_blackwell_grouped_gemm       # ← grouped GEMM template (variable M per group)
  - resources/cutlass-4.4.2/examples/74_blackwell_gemm_streamk       # Stream-K scheduling — fills SMs at low active-expert count
  - resources/cutlass-4.4.2/examples/81_blackwell_gemm_blockwise     # blockwise scales — closest analog to group-32 scale layout
  - resources/cutlass-4.4.2/examples/91_fp4_gemv                     # small-M (GEMV-shaped) Blackwell — relevant for T=1
  - resources/cutlass-4.4.2/examples/70_blackwell_gemm               # basic Blackwell GEMM with tcgen05 (start here if 92 is too dense)

  # ── Tier 3: DeepGEMM SM100 GEMM implementations ────────────────────────
  - resources/deepgemm-2.1.1.post3/deep_gemm/include/deep_gemm/impls/sm100_bf16_gemm.cuh   # BF16 grouped GEMM (no quant — for scaffold)
  - resources/deepgemm-2.1.1.post3/deep_gemm/include/deep_gemm/impls/sm100_fp8_gemm_1d1d.cuh # FP8 grouped GEMM with scales

  # ── Tier 4: Prior ferret GEMM artifacts (in-repo wins on similar shapes) ─
  - examples/qwen3-8b-decode-linear-bs16/v019_swapab_cg2_l2hints.cu  # swapAB cg2 GEMM at M=16 — CLOSEST in-repo win, study first
  - examples/tcgen05-gemm/05b_cg2_swapab_small_m.cu                  # cg2 swapAB for small-M GEMM — the swapAB pattern
  - examples/tcgen05-gemm/06_persistent_kernel.cu                    # persistent kernel scaffold (for empty-expert skip schedule)
  - examples/tcgen05-gemm/07_cg2_persistent_large_m.cu               # cg2 + persistent
  - examples/fp8-gemm/v009_large_m_block_scale_mma_080.cu            # block-scale FP8 GEMM (group-K scale handling)

  # ── Tier 5: HW programming model — only the parts that matter for GEMM ─
  - resources/cutlass-4.4.2/include/cute/atom/mma_traits_sm100.hpp   # tcgen05 atom definitions (find the right N=8/16 atom)
  - docs/ptx-isa-9.2                                                  # tcgen05.mma, cp.async.bulk.tensor, mbarrier reference

  # Deliberately NOT in this list (would mislead the agent into attention
  # patterns that don't apply to a GEMM): FlashMLA, FA4, 77_blackwell_fmha,
  # FlashInfer (mostly attention), gqa-decode-qwen3-8b/v036 (attention — has
  # the N=8 atom but the surrounding superstructure is online-softmax,
  # irrelevant here).

configs:
  # 2 configs: T=1 (BS=1 decode) and T=8 (speculative decode K=8 lookahead).
  # Parallelism = TP=8 EP=1 only.
  # Token-to-expert routing uses a deterministic balanced distribution (each
  # of T tokens picks top_k=8 distinct experts uniformly from E_loc=384).
  # The baseline + kernel MUST agree on the routing layout (sorted_token_ids
  # contract from vllm.model_executor.layers.fused_moe.moe_align_block_size).

  - name: T1
    args: { T: 1, TOP_K: 8, H: 7168, N_r: 512, I_r: 256, E_loc: 384 }
    target_ratio: 1.10
    weight: 2.0    # production-critical BS=1 decode

  - name: T8
    args: { T: 8, TOP_K: 8, H: 7168, N_r: 512, I_r: 256, E_loc: 384 }
    target_ratio: 1.10
    weight: 1.0    # speculative-decode lookahead

scoring: min_ratio

stage_gate:
  ratio: 0.50
  strict: false

constraints:
  # ── compilation + scoring infra ─────────────────────────────────────────
  - "Single self-contained CUDA file kernel.cu that compiles standalone with: nvcc -arch=sm_100a -std=c++17 -O3 --use_fast_math --expt-relaxed-constexpr -I resources/cutlass-4.4.2/include -o kernel kernel.cu -lcuda -lcudart. NO additional -l flags, NO external library links. The .cu MUST contain main() + dequant→bf16 reference + correctness check + benchmark + emit KERNEL_RESULT line for ALL 4 configs."
  - "Your kernel.cu may NOT link against, #include, or call cuBLAS, cuDNN, Marlin, vLLM, TRT-LLM, FlashInfer, DeepGEMM, or any black-box GEMM/MoE library. You MAY read those sources via read_reference(...) to learn patterns, but must IMPLEMENT the kernel yourself. Failure → INVALID."
  - "Single CUDA stream only. No CUDA graphs. No graph capture tricks."
  - "cta_group::1 or cta_group::2 are both allowed. 2-CTA clusters supported on this build."

  # ── HARD architecture constraints (drive the whole design) ──────────────
  - "CRITICAL HARDWARE FACT: SM100 tcgen05.mma does NOT support int4/uint4 inputs. Supported kinds: f16/bf16/tf32, i8/u8, fp8 (e4m3/e5m2), fp6 (e2m3/e3m2), fp4 (e2m1). There is NO INT4 tensor-core path. INT4 is WEIGHT-STORAGE-ONLY: the mainloop MUST dequantize INT4 → BF16 on-chip (in registers or TMEM staging), then run a BF16 tcgen05.mma. The INT4 format buys WEIGHT BANDWIDTH only; do NOT design around a nonexistent INT4 MMA atom."
  - "All matmul operations MUST go through tcgen05.mma (tcgen05.mma.cta_group::1.kind::f16 with bf16 operands, or cta_group::2 variant). If the compiled SASS contains FFMA in the K-iteration mainloop after dequant, the kernel is INVALID. CUDA-core fallback is forbidden."
  - "All weight (INT4-packed-as-INT32) loads MUST use TMA (cp.async.bulk.tensor with mbarrier completion). Element-wise __ldg or per-thread cp.async.ca per-INT32-word loops are INVALID for the weight stream. The TMA tensor descriptor may declare the weight as INT32 elements — TMA does not natively know INT4; that is fine, just transfer the int32-packed bytes and unpack on-chip."
  - "swapAB is REQUIRED: tokens (M_e <= 8) MUST land on the MMA N-axis (N=8 with cta_group::1, or N=16 with cta_group::2). Putting tokens on M and padding to M=64/128 wastes 87-94% of MMA capacity at T<=8 and is INVALID. The weight axis (2I_r = 512 or 1024) becomes the MMA M-axis (filled to multiples of 64 or 128 — naturally aligned). Express via descriptor transpose bits / Major::K Major::MN selection — NO physical data transpose of the weight tensor."
  - "Warp specialization REQUIRED. At least 3 distinct warp roles dispatched via warp-id: (a) TMA producer (weight + activation + scale loads), (b) MMA launcher (single-thread tcgen05.mma issue), (c) dequant + softmax-equivalent + epilogue consumer. Single-role kernels (every warp does everything) are INVALID. Use setmaxnreg.inc / setmaxnreg.dec to split registers between roles."
  - "Empty-expert skip REQUIRED. The tile schedule MUST skip experts with M_e = 0. A naive schedule that launches CTAs for all E_loc experts (waste at T<=8 where <=64 are active) is INVALID."

  # ── numerics ────────────────────────────────────────────────────────────
  - "INT4 nibble decode: nibbles are stored offset-8 unsigned. Convert to signed via signed_value = raw_nibble - 8, giving range [-8, 7]. Apply per-row group-32 BF16 scale to obtain the BF16 weight element. Group boundaries: scale index for K-position k of row r is scales[r, k/32]. Do this conversion ON-CHIP after TMA load; do NOT do it in a pre-pass kernel."
  - "BF16 input activations + BF16 dequantized weights (after INT4→BF16). FP32 accumulator inside the MMA. BF16 output."
  - "FUSED silu·mul epilogue is REQUIRED. The kernel MUST emit [num_routed_pairs, I_r=256] BF16 with values silu(gate) * up, where gate is the first I_r=256 columns of the GEMM output and up is the second I_r=256 columns. Emitting an unfused [P, 2I_r=512] intermediate (separate activation kernel afterward) is INVALID — the baseline measures Marlin's moe_wna16_marlin_gemm + apply_moe_activation(SILU) as a fused-equivalent reference, so the kernel must match that output for an apples-to-apples comparison."
  - "Output must match the dequant→BF16 oracle within max relative error < 5e-3 AND max absolute error < 1.0 on the same random-input distribution used for benchmarking. Use distinct nibble patterns per expert so a per-expert dispatch bug shows up in the error metric."
  - "MANDATORY OUTPUT VALIDATION: kernel.cu MUST include the dequant→BF16 fp32-accumulate reference and emit 'INVALID' for any failing config (parsed as 0.0 TFLOPS). DO NOT remove this guard. ALL 4 configs MUST pass correctness, including the routing edge cases (single-expert assignment, balanced assignment, sparse assignment) — exercise at least 2 routing distributions in the validation pass."

  # ── measurement methodology ─────────────────────────────────────────────
  - "TFLOPS measured as: flops = 2 * sum_e (M_e * N_r * H) for the routing distribution used at benchmark time, where N_r = 2I_r = 512 (the pre-silu GEMM N) — silu·mul itself is ~3 FLOPS per output element and is NOT counted in the GEMM FLOPS. Report time as median over NI=300 timed iterations. T1 has flops = 2 * top_k * 1 * 512 * 7168 ≈ 59M. T8 has flops up to 2 * 64 * 512 * 7168 ≈ 470M. Reported TFLOPS is unimpressive at these shapes (memory-bound, T<=8); use latency (us) as the primary scoring number internally but report TFLOPS as the spec demands."
  - "MANDATORY L2 FLUSH: kernel benchmark MUST flush a 128 MB device buffer (cudaMemset on a 128MB device buffer) immediately before each timed iteration. The flush MUST exceed B200's 192 MB L2 — use 256 MB if a 128 MB flush still shows residency artifacts. Use a continuous warmup of >= 2.0 seconds BEFORE the timed loop. See baselines/kimi-moe-w13-int4/baseline_marlin.py for the exact methodology — match it bit-for-bit so the comparison is apples-to-apples."
  - "Achieved INT4 weight bandwidth (in TB/s) MUST be reported in the kernel's stderr per config. Bandwidth = sum_e (N_r * H * 0.5 bytes) / median_time. The realistic ceiling on B200 HBM3e is ~6-7 TB/s (75-85% of peak 8 TB/s). Beating Marlin means getting closer to that ceiling than Marlin does."

hints:
  - |
    ## REPRODUCE-stage roadmap (do NOT try to skip steps)

    Step 0 (~iter 1): read the MARLIN baseline source. THIS IS WHAT YOU ARE
    COMPETING AGAINST and most of the design (K-tile permutation, INT4
    unpack with lop3+PRMT, dequant→bf16 mainloop pipeline, MoE expert
    scheduling) is already laid out there in plain CUDA.
      - resources/marlin-standalone/marlin/marlin_cuda_kernel.cu (822 lines,
        the canonical hand-tuned reference; SM80/SM90 — translate idioms to
        SM100 by replacing cp.async with cp.async.bulk.tensor, WMMA/WGMMA
        with tcgen05.mma, ldmatrix with tcgen05.cp/utccp where relevant)
      - resources/vllm-csrc-marlin/csrc/libtorch_stable/quantization/marlin/marlin_template.h
        (the inner kernel template — see the K-iteration body and the
        scale-application pattern)
      - resources/vllm-csrc-marlin/csrc/libtorch_stable/moe/marlin_moe_wna16/marlin_template.h
        (the MoE wrapping — expert id dispatch, sorted_token_ids consumption,
        per-expert tile assignment)
      - resources/vllm-csrc-marlin/csrc/libtorch_stable/quantization/marlin/gptq_marlin_repack.cu
        (how the compressed-tensors INT4 weights are re-permuted into Marlin's
        internal K-tile layout — the kernel must match this layout to load
        weights via TMA correctly)
      - resources/vllm-csrc-marlin/csrc/libtorch_stable/quantization/marlin/marlin_dtypes.cuh
        (the actual lop3+PRMT dequant code you can port directly)

    Step 1 (~iter 2-3): read examples/qwen3-8b-decode-linear-bs16/v019_swapab_cg2_l2hints.cu
    — closest in-repo GEMM win. Already does swapAB, tcgen05.mma.cta_group::2,
    TMA cp.async.bulk.tensor weight loads, warp specialization, L2 cache hints.
    The INT4 dequant + grouped-MoE scheduling are the ONLY new pieces on
    top of this skeleton.

    Step 2 (~iter 3-5): read the CUTLASS GEMM examples in order:
      - 70_blackwell_gemm        — basic tcgen05 GEMM, the simplest scaffold
      - 86_blackwell_mixed_dtype_gemm — INT4 weight × BF16 act with on-chip
                                       dequant; PORT the dequant fragment
                                       directly (lop3+PRMT) into the agent's
                                       mainloop
      - 75_blackwell_grouped_gemm — grouped GEMM with variable M per group;
                                    PORT the per-group tile schedule
      - 92_blackwell_moe_gemm    — full MoE GEMM scaffold (closest possible
                                   match, may be more general than this task
                                   needs)
    Also: deepgemm sm100_fp8_gemm_1d1d.cuh shows a clean SM100 grouped GEMM
    with scale handling (FP8 not INT4, but the scale-application skeleton
    is similar to group-32).

    Step 3 (~iter 5-7): wire the INT4 unpack. The pattern (Marlin's playbook
    + CUTLASS 86_blackwell_mixed_dtype_gemm):
      - TMA-load weight as INT32-typed tensor (8 nibbles/word, K-major).
      - In the consumer warps, unpack 8 nibbles → 8 bf16 via lop3.b32 + PRMT
        (search "int4 to bf16 dequant lop3 PRMT" or "Marlin dequant trick").
      - Apply group-32 BF16 scale: each 32-K-chunk shares a single bf16 scale.
        Load scales via a separate TMA descriptor or normal cp.async (they
        are ~12% of weight bandwidth — separate stream avoids TMA descriptor
        gymnastics).
      - Stage the BF16-dequantized weights either in registers (small N=8/16
        tile, fits easily) or in SMEM if using cta_group::2 with a larger
        weight tile.

    Step 4 (~iter 7-9): grouped-GEMM tile schedule. Compact the token-to-expert
    routing into a sorted index (vLLM/SGLang fused_moe pattern: moe_align_block_size
    + token_mask). Each CTA picks (expert, weight-N-tile, optional weight-K-split).
    Persistent kernel with Stream-K scheduling fills SMs when only <=64 experts
    are active out of E_loc=384. Marlin's
    resources/vllm-csrc-marlin/csrc/libtorch_stable/moe/marlin_moe_wna16/marlin_template.h
    shows exactly how its scheduler consumes the (sorted_token_ids, expert_ids,
    num_tokens_post_padded) triplet produced by moe_align_block_size — match
    the same contract so the agent's kernel is a drop-in replacement.

    ## OPTIMIZE-stage levers (in priority order)

    a) Weight-bandwidth optimization is THE bottleneck. Maximize TMA-bulk
       transfer size per descriptor (large box dims). Use 128-byte swizzle.
       Overlap dequant with MMA via mbarrier double-buffering. Match or beat
       Marlin's achieved bandwidth (likely ~5-6 TB/s on B200; ceiling ~7 TB/s).

    b) cta_group::2 cluster MMA — at N=16 with cg2, you share weight TMA
       across 2 CTAs, halving redundant weight load. Promising at the larger
       2I_r=1024 N axis. The qwen3-8b linear v019 used cg2 — borrow that.

    c) L2 promotion of weights — at T=1, 8 experts × 3.67 MB = 29 MB fits L2
       (192 MB). At T=8 up to 64 experts × 3.67 MB = 235 MB exceeds L2 → the
       L2 hit-rate craters. Use L2 evict-last hints on weights at T=1 and
       evict-first/streaming hints at T=8.

    d) Fused silu·mul epilogue (LOW priority, separate ablation). Compute
       silu(gate)·up on FP32 accumulators in-register and store only [P, I_r]
       instead of writing [P, 2I_r] and running a separate activation kernel.
       Requires a load-time B-interleave of gate/up weight rows so each
       output block's gate and up operands land in the same CTA's
       accumulator. Savings: <1% of total traffic at T<=8 (weights dominate),
       BUT saves one kernel-launch hop and halves the output store. Worth
       ~3-5% e2e but only as a secondary win; build the un-fused version
       first, then add this as an ablation.

    e) Per-expert GEMV fallback (consider only if grouped tile schedule has
       real overhead). Marlin uses a grouped approach with success at T<=8,
       so grouped IS viable — DO NOT prematurely switch to per-expert. Only
       fall back if profiling shows tile-schedule dispatch overhead > 5%.

    ## What NOT to do (will INVALID or regress)

    - Trying to find / design an INT4 tensor-core path. There IS NO INT4
      tcgen05 atom. The mainloop is BF16-MMA after dequant. Period.
    - Putting tokens on the MMA M-axis. M_min = 64; you would pad M_e=8 to
      M=64 (12.5% util) or M=128 (6.3%). swapAB → N is mandatory.
    - Using CUDA-core dot-product fallback "because it's simpler at M=8".
      Hard constraint above — fails the SASS check.
    - Materializing a [E_loc, 2I_r, H] dequantized BF16 weight tensor in
      HBM. That defeats the entire point of INT4 weight-streaming. Dequant
      MUST happen on-chip per tile.
    - Launching one kernel per expert. Single grouped launch with internal
      expert iteration is required.
    - Padding the routing to a fixed M per expert in global memory. Compact
      gather + predicated tile is the right pattern.

budget:
  max_iterations: 80
  max_wall_minutes: 360

output:
  result_format: kernel_result_json
  result_keys:
    - T1
    - T8
