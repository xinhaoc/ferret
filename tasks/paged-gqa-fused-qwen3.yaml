# ferret task — UNIFIED Paged GQA for Qwen3-30B-A3B
# One kernel handles Q in {1,2,3,4} x seq in {128, 512, 4k, 32k}.
# Three already-verified specialized kernels exist; this task is to FUSE them
# into a single binary that matches each at its sweet spot.

name: paged-gqa-fused-qwen3
gpu: B200
arch: sm_100a
precision: BF16

problem:
  description: |
    Unified paged GQA attention for Qwen3-30B-A3B (TP=4 per-rank shape).
    Single kernel.cu binary handles ALL 16 configs:
      Q_LEN in {1, 2, 3, 4}  x  SEQ_LEN in {128, 512, 4096, 32768}

    Three already-verified specialized kernels exist (saved as artifacts):
      (A) examples/paged-gqa-decode-qwen3/v012_q1_seq4k_2x.cu
          — Q=1 paged decode. 2-launch (main + combine_kernel_q1).
            Wins 2.18x vs FlashInfer at seq=4k, ties at seq=128/512/32k.
      (B) examples/paged-gqa-multitoken-qwen3/v007_q234_seq4k_2x.cu
          — Q=2/3/4 multi-token. 2-launch (main + combine_kernel_mt) with
            split-KV across CTAs and SEPARATE combine kernel. Wins 2-3x at
            seq=4k, loses at seq=128 (0.74-0.90x) and seq=32k (0.56-0.78x).
      (C) Workspace v009 (NOT saved as artifact yet — agent should
          re-derive)  — Q=2/3/4 single-launch FUSED atomic-combine version.
          Wins 1.27-1.41x at seq=128. CORRECTNESS BREAKS at seq>=32k
          when ns = (seq + kvc - 1) / kvc reaches 4096+ splits.

    A naive "use v009 everywhere" approach was empirically tested and FAILED:
      - q1_seq4k: 100us (vs v012's 21us — 5x slower; v009's atomic combine
        is heavier than v012's dedicated combine for Q=1)
      - q*_seq32k: CORRECTNESS FAILURE (mre=136-1033) — atomic combine
        breaks at ns >= 4096 splits
      - q[234]_seq4k: 100-120us (vs v007's 27-36us — 3-4x slower)

    So a true fused kernel needs runtime dispatch INSIDE the kernel.cu file:
      if (q_len == 1 && seq_len > 256)        path A (v012 design)
      elif (seq_len >= 8192)                   path B (v007: separate combine)
      else                                     path C (v009: atomic combine)
    OR, equivalently, three separate __global__ kernels in the same file
    dispatched from the host wrapper based on (q_len, seq_len).

    The constraint is one binary (single kernel.cu), one stream, and matching
    or beating each specialized kernel at its sweet spot. You are NOT
    required to invent a single monolithic kernel — multiple __global__
    functions in the same .cu file dispatched at host-side is acceptable.

    Target model: Qwen3-30B-A3B per-rank shape under TP=4:
      NUM_QO_HEADS=8, NUM_KV_HEADS=1 (GQA group = 8), HEAD_DIM=128
      PAGE_SIZE=4096

    Causal mask among query tokens (Q>1 only): query token i attends to KV
    positions [0, SEQ_LEN - Q_LEN + 1 + i). Query 0 sees fewest, query Q-1
    sees all SEQ_LEN positions.

    Kernel signature (host-side):
      Inputs (device pointers):
        Q:                bf16 [Q_LEN, NUM_QO_HEADS, HEAD_DIM]
        paged_KV_cache:   bf16 [num_pages, 2, PAGE_SIZE, NUM_KV_HEADS, HEAD_DIM]
                          (NHD layout, [K_page; V_page] interleaved)
        qo_indptr:        int32 [b+1]  (for b=1, [0, Q_LEN])
        kv_indptr:        int32 [b+1]  (for b=1, [0, num_pages])
        kv_indices:       int32 [num_pages_total]
        kv_last_page_len: int32 [b]
      Output:
        Out: bf16 [Q_LEN, NUM_QO_HEADS, HEAD_DIM]
      Scalar: sm_scale = 1/sqrt(HEAD_DIM)

  shapes:
    HEAD_DIM:       128
    NUM_QO_HEADS:   8
    NUM_KV_HEADS:   1
    GQA_GROUP:      8
    PAGE_SIZE:      4096

baseline:
  source: "FlashInfer paged GQA — Q=1 uses BatchDecodeWithPagedKVCacheWrapper(use_tensor_cores=True), Q>1 uses BatchPrefillWithPagedKVCacheWrapper(causal=True). Run: python3 baselines/paged-gqa-fused-qwen3/baseline.py"
  reference_commit: "flashinfer 0.6.8.post1"

references:
  # Saved Q=1 architecture (path A in the dispatcher above)
  - examples/paged-gqa-decode-qwen3/v012_q1_seq4k_2x.cu
  # Saved Q=2/3/4 separate-combine architecture (path B) — winner at seq=4k
  - examples/paged-gqa-multitoken-qwen3/v007_q234_seq4k_2x.cu
  # Saved Q=2/3/4 single-launch fused atomic-combine (path C) — winner at seq=128
  - examples/paged-gqa-multitoken-qwen3/v009_q234_atomic_combine_seq128_1.4x.cu
  # CUTLASS Blackwell FMHA examples
  - resources/cutlass-4.4.2/examples/77_blackwell_fmha
  - resources/cutlass-4.4.2/examples/72_blackwell_narrow_precision_gemm
  # Prior verified tcgen05 attention work
  - examples/fp8-mla-decode-dsv4/v033_partial_match_785.cu
  # FlashInfer source — study both decode and prefill paths
  - resources/flashinfer-0.6.7.post3

configs:
  # Target ratios match what the specialized kernels independently measure.
  # The fused kernel must NOT regress below these at each config.
  # min_ratio scoring — the worst config drags the score, forcing the
  # agent to address ALL regimes, not just the easy wins.

  # ===== Q=1 (decode wrapper) =====
  # SMALL-SEQ FOCUS: targets raised above v011's current ratios to force the
  # agent to push beyond launch-overhead floor. v011 hits 125% at q1_seq128,
  # 146% at q1_seq512 — so any iteration must beat those AND new targets.
  - name: q1_seq128
    args: { B: 1, Q_LEN: 1, SEQ_LEN: 128, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.50   # was 0.85 — pushing past 12us launch floor
    weight: 2.0          # weighted up
  - name: q1_seq512
    args: { B: 1, Q_LEN: 1, SEQ_LEN: 512, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.35   # was 1.00 — push close to FI's 16us
    weight: 2.0
  - name: q1_seq4k
    args: { B: 1, Q_LEN: 1, SEQ_LEN: 4096, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.50   # v012 hits 2.18x here, easy headroom
    weight: 1.0
  - name: q1_seq32k
    args: { B: 1, Q_LEN: 1, SEQ_LEN: 32768, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 0.85
    weight: 1.0

  # ===== Q=2 (prefill wrapper, causal) =====
  - name: q2_seq128
    args: { B: 1, Q_LEN: 2, SEQ_LEN: 128, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.50   # v011 hits 154%, push slightly past
    weight: 2.0
  - name: q2_seq512
    args: { B: 1, Q_LEN: 2, SEQ_LEN: 512, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.35   # v011 hits 147%, push slightly past
    weight: 2.0
  - name: q2_seq4k
    args: { B: 1, Q_LEN: 2, SEQ_LEN: 4096, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.50   # v007 hits 2x here
    weight: 1.0
  - name: q2_seq32k
    args: { B: 1, Q_LEN: 2, SEQ_LEN: 32768, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 0.50   # v007 loses 0.56x here (bandwidth-bound)
    weight: 1.0

  # ===== Q=3 (prefill wrapper, causal) =====
  - name: q3_seq128
    args: { B: 1, Q_LEN: 3, SEQ_LEN: 128, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.50   # v011 hits 153%, push slightly past
    weight: 2.0
  - name: q3_seq512
    args: { B: 1, Q_LEN: 3, SEQ_LEN: 512, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.35   # v011 hits 153%, push slightly past
    weight: 2.0
  - name: q3_seq4k
    args: { B: 1, Q_LEN: 3, SEQ_LEN: 4096, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.50   # v007 hits 3x here
    weight: 1.0
  - name: q3_seq32k
    args: { B: 1, Q_LEN: 3, SEQ_LEN: 32768, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 0.50
    weight: 1.0

  # ===== Q=4 (prefill wrapper, causal) =====
  - name: q4_seq128
    args: { B: 1, Q_LEN: 4, SEQ_LEN: 128, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.50   # v011 hits 153%, push slightly past
    weight: 2.0
  - name: q4_seq512
    args: { B: 1, Q_LEN: 4, SEQ_LEN: 512, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.35   # v011 hits 139%, push slightly past
    weight: 2.0
  - name: q4_seq4k
    args: { B: 1, Q_LEN: 4, SEQ_LEN: 4096, NUM_QO_HEADS: 8, NUM_KV_HEADS: 1, HEAD_DIM: 128, PAGE_SIZE: 4096 }
    target_ratio: 1.50   # v007 hits 3x here
    weight: 1.0
