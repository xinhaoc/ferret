scoring: min_ratio

stage_gate:
  ratio: 0.40
  strict: false

constraints:
  - "Single self-contained CUDA file kernel.cu that compiles standalone with: nvcc -arch=sm_100a -std=c++17 -O3 --expt-relaxed-constexpr -I resources/cutlass-4.4.2/include -o kernel kernel.cu -lcuda -lcudart. NO additional -l flags, NO external library links. The .cu MUST contain main() + fp32 reference + correctness check + benchmark + emit KERNEL_RESULT line for ALL 16 configs."
  - "Your kernel.cu may NOT link against, #include, or call FlashInfer's compiled kernels. You MAY read FlashInfer source via read_reference(resources/flashinfer-0.6.7.post3/...) but must IMPLEMENT the kernel yourself. Failure → INVALID."
  - "Single CUDA stream only. No CUDA graphs. No graph capture tricks."
  - "cta_group::1 only. 2-CTA clusters NOT supported on this build."
  - "BF16 input Q + bf16 KV cache, BF16 output. FP32 accumulator inside softmax/MMA."
  - "KV cache layout MUST be NHD: shape [num_pages, 2, PAGE_SIZE, NUM_KV_HEADS, HEAD_DIM] where the second dim is [K_page; V_page]. Match the saved Q=1 and Q=2/3/4 artifacts exactly."
  - "qo_indptr is int32 [b+1]; for b=1 with Q_LEN=k, qo_indptr=[0, k]. The kernel must support ALL Q_LEN in {1, 2, 3, 4}."
  - "CAUSAL MASK among query tokens (Q>1 only): query i (0-indexed) attends to KV positions [0, SEQ_LEN - Q_LEN + 1 + i). Earlier queries see fewer cache positions. The kernel MUST apply this mask correctly — incorrect causal mask is INVALID even if numerics pass on data that happens not to expose the bug. Use distinct values per KV position in your test data so a mask bug shows up in mean_rel_err."
  - "sm_scale = 1.0 / sqrt(HEAD_DIM) = 1.0/sqrt(128)."
  - "TFLOPS measured over REAL causal FLOPs. For Q>1: flops = 4 * NUM_QO_HEADS * HEAD_DIM * Q * (SEQ_LEN - (Q-1)/2). For Q=1: flops = 4 * NUM_QO_HEADS * HEAD_DIM * SEQ_LEN. Do NOT count work for masked positions."
  - "Output must match fp32 reference within max relative error < 1e-2 AND max absolute error < 1.0 AND mean absolute error < 1e-2. The fp32 reference is computed in the same kernel.cu binary."
  - "MANDATORY OUTPUT VALIDATION: kernel.cu MUST include a reference comparison and emit 'INVALID' for any failing config (parsed as 0.0 TFLOPS). DO NOT remove this guard. ALL 16 configs MUST pass correctness — including seq=32k for all Q values. A previously-attempted atomic-combine architecture (v009-style) failed correctness at seq=32k with mre=136-1033; this is the failure mode you MUST avoid. If seq>=8192 you likely need the SEPARATE combine kernel architecture (v007-style) to maintain precision across many splits."
  - "MANDATORY L2 FLUSH: kernel benchmark MUST flush a 128 MB buffer (cudaMemset on a 128MB device buffer) immediately before each timed iteration. Reported TFLOPS must be median across NI per-iteration measurements. Use NI >= 300. Use a continuous warmup of >= 2.0 seconds (loop until 2 seconds elapsed) BEFORE the timed loop, to ramp GPU clocks to steady state. See baselines/paged-gqa-fused-qwen3/baseline.py for the exact methodology."
  - "Reuse the EXACT same benchmark harness shape (cudaMemset flush, 2-sec warmup, 300-iter median, sorted median) as baselines/paged-gqa-fused-qwen3/baseline.py. Mismatched measurement methodology gives false ratios."

hints:
  - |
    ## SMALL-SEQ FOCUS (2026-05-30 restart)

    The v011 kernel currently in workspace/ already achieves min_ratio=1.147
    (q2_seq32k bottleneck). At small seq (seq=128 and seq=512) v011 hits:
      q1_seq128: 125% (12.6us vs FI 16.2us)   <- AT B200 launch floor
      q1_seq512: 146%
      q2_seq128: 154% (12.4us vs FI 16.6us)   <- AT B200 launch floor
      q3_seq128: 153%
      q4_seq128: 153%
      q4_seq512: 139%

    Targets are raised to 1.50x at seq=128 and 1.35x at seq=512 to push beyond
    v011. These configs are launch-overhead-dominated (~10-12us floor on B200
    for any minimal kernel launch). To beat 12us at q*_seq128 requires
    eliminating launches, not making the launched kernel faster.

    Concrete ideas to explore — measure each, do not guess:

    1. Extend single-launch atomic-combine path: currently `paged_gqa_fused`
       (Q>1) only runs for seq<=128, and `paged_gqa_decode_fused` (Q=1) also
       only for seq<=128. At seq=512, ns = 512/8 = 64 splits — atomic combine
       MIGHT still be numerically OK at 64 splits (it fails at 4096). Test it.
       If yes, this saves a kernel launch (~3-5us) at seq=512.

    2. tcgen05 (BF16 WGMMA on tensor cores) — the open question. PRIORS:
       - Setup cost: ~8-15us per launch for TMEM alloc + MMA pipeline fill +
         WS warpgroup state. At q1_seq128 (current 12us) this LIKELY regresses.
       - At q4_seq512 (current 19.5us with 4 query rows x 512 KV tokens) the
         compute is large enough that WGMMA throughput MIGHT amortize setup.
       - WGMMA atom on B200 is M=64 minimum (cta_group::1). Q=4 means heavy
         padding (M=4 effective, M=64 allocated, 16x waste). Q=8+ would help
         more — but we don't support Q=8 in this task.
       - The MLA decode task (examples/fp8-mla-decode-dsv4/v033) shows a
         working 3-warpgroup tcgen05 attention skeleton — use it as reference.
       - DECISION RULE: test tcgen05 at q4_seq512 first (most favorable
         shape for WGMMA). If it regresses there, no point trying smaller.
         If it wins at q4_seq512, then try q3_seq512, q2_seq512. Almost
         certainly will NOT help at any seq=128 config.

    3. Single-launch dispatcher: currently host dispatches to one of 9 kernels
       per (q,seq). Each launch is a separate cudaLaunchKernel. A single
       __global__ that branches on q_len at the start could save ~1-2us in
       launch overhead pipelining (back-to-back submissions). RISKY — adds
       register pressure from supporting all paths.

    4. Driver API (cuLaunchKernel) vs runtime API (<<<>>>): marginal but real.
       The runtime <<<>>> syntax inserts an extra synchronization layer; raw
       cuLaunchKernel saves ~0.5-1us. Probably noise but worth testing once.

    HARD CONSTRAINT: every optimization must beat v011 on ALL 16 configs
    after measurement. If it regresses anywhere, revert. v011 is the floor.
    Save v011 as a baseline tag before experimenting.

  - |
    Empirical baseline numbers (FlashInfer, B200, measured 2026-05-28):
      q1_seq128: ~11us   q1_seq512: ~13us   q1_seq4k: ~47us   q1_seq32k: ~57us
      q2_seq128: ~16us   q2_seq512: ~21us   q2_seq4k: ~56us   q2_seq32k: ~57us
      q3_seq128: ~16us   q3_seq512: ~21us   q3_seq4k: ~87us   q3_seq32k: ~64us
      q4_seq128: ~16us   q4_seq512: ~22us   q4_seq4k: ~87us   q4_seq32k: ~91us

    Specialized-kernel reference numbers (saved artifacts):
      v012 (Q=1 only):   seq128: 13us  seq512: 13us  seq4k: 22us  seq32k: 56us
      v007 (Q=2/3/4):    seq128: 17us  seq512: 25us  seq4k: 27us  seq32k: 102us
      v009 (Q=2/3/4 fused at seq=128): seq128: 12us  (FAILS at seq>=32k)

    Suggested kernel.cu structure (3 __global__ kernels + host dispatcher):
      __global__ paged_gqa_q1_dual()       // v012 design — Q=1 only
      __global__ paged_gqa_mt_split()      // v007 design — main split-KV pass
      __global__ paged_gqa_mt_combine()    // v007 design — separate combine
      __global__ paged_gqa_mt_fused()      // v009 design — single-launch atomic combine

      void paged_gqa_unified(...) {
        int ns = (seq_len + KV_CHUNK - 1) / KV_CHUNK;
        if (q_len == 1) {
          launch q1_dual + combine_q1;
        } else if (ns >= SPLIT_THRESHOLD) {  // e.g. seq >= ~4096
          launch mt_split + mt_combine;
        } else {
          launch mt_fused;                   // small seq, few splits → atomic OK
        }
      }

    The architecture choice matters because:
      - v009's atomic combine is fast for ns <= 64 splits but breaks numerics
        at ns >= 4096 (seq=32k with KV_CHUNK=8). Don't try to atomic-combine
        across thousands of splits.
      - v007's separate combine kernel is safe at any ns but has a 2nd launch
        cost; only worth it when ns is large enough that the split work
        dominates the extra launch.
      - v012's Q=1 path uses a simpler combine because Q=1 means no causal
        mask among query tokens and only 1 row of output per head.

    For seq=512 (the middle regime), neither saved kernel was tuned. The agent
    has freedom here to pick whichever path is faster, or to introduce a 4th
    code path optimized for that range.

    KV_CHUNK sizes used in saved artifacts:
      v012 (Q=1):       kvc = 8
      v007 (Q=2,3):     kvc = 64
      v007 (Q=4):       kvc = 32
      v009 (Q=2,3,4):   kvc = 8

