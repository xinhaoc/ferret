# ferret task spec — Qwen3-8B decode linear at M=16 on B200
#
# Target: beat CUTLASS (Blackwell BF16 GEMM) by 30% across all 5 projections
# at batch size M=16 (typical for speculative decoding / small-batch serving).
#
# No pre-set baseline_tflops — agent measures CUTLASS itself via its own
# benchmark harness and emits KERNEL_RESULT_REFERENCE. This keeps the
# REPRODUCE stage honest: agent can't cheat the stage gate with an
# artificially low estimate.

name: qwen3-8b-decode-linear-bs16-b200
gpu: B200
arch: sm_100a
precision: BF16

problem:
  description: |
    Qwen3-8B decode-phase linear projections at batch size M=16 on B200.
    BF16 input, BF16 weight, BF16 output, FP32 accumulator.

      out[16, N] = in[16, K] @ weight[N, K]^T   (+ residual for O, Down)

    The 5 Qwen3-8B projections at M=16:
      QKV     N=6144    K=4096   (no residual)
      O       N=4096    K=4096   (+residual)
      GateUp  N=24576   K=4096   (no residual)
      Down    N=4096    K=12288  (+residual)
      LMHead  N=153600  K=4096   (no residual)

    Unlike the M=1 decode case, M=16 makes tensor cores the right tool.
    tcgen05's minimum MMA tile is M=64, so padding from M=16 wastes
    only 4x of the lanes (vs 64x waste at M=1). A well-tuned tcgen05
    kernel should beat CUDA-core FMA by 3-5x on these shapes. Expect
    the winning kernel to use tcgen05, cluster MMA (cta_group::2), and
    TMA bulk async loads.

    Kernel layout freedom: one unified kernel with runtime dispatch, OR
    multiple __global__ kernels in kernel.cu with host-side selection.

    Residual (O, Down): fuse into the GEMM epilogue. Do not launch a
    separate add kernel.

  shapes:
    M: 16

baseline:
  # Scoring target only. Agent must measure cuBLAS in the same harness as
  # its kernel (cublasGemmEx, same GPU, same L2-flush methodology) and emit
  # the TFLOPS as KERNEL_RESULT_REFERENCE.
  source: cuBLAS

references:
  # Read during REPRODUCE to learn the architecture. NOT the scoring baseline.
  - examples/tcgen05-gemm/                                                         # hand-written PTX tcgen05 BF16 GEMM progression
  - resources/cutlass-4.4.2/examples/71_blackwell_gemm_with_collective_builder     # CUTLASS sm100 BF16 GEMM template
  - resources/cutlass-4.4.2/examples/74_blackwell_gemm_streamk                     # stream-K scheduler for shapes with few tiles
  - resources/flashinfer-0.6.7.post3/include/flashinfer/gemm/tgv_gemm.cuh          # sm100 BF16 GEMM using CUTLASS primitives
  - resources/deepgemm-2.1.1.post3/deep_gemm/include/deep_gemm/impls/sm100_bf16_gemm.cuh  # persistent scheduler + TMA store epilogue
  - examples/tcgen05-gemm/05b_cg2_swapab_small_m.cu                                        # cg2 for small-M via swapab (verified correct on B200, needs tuning)
  - examples/qwen3-8b-decode-linear-bs16/v019_swapab_cg2_l2hints.cu                        # current best cg2 kernel (1.07 min_ratio vs cuBLAS) — port to cg1

# Targets calibrated against cuBLAS on B200 for M=16 BF16 (2026-04-15 bench):
#   QKV   kernel 42.65 vs cuBLAS 43.46 → 98%
#   O     kernel 31.54 vs cuBLAS 28.34 → 111% (residual-fusion wins)
#   GateUp kernel 62.91 vs cuBLAS 64.90 → 97%
#   Down   kernel 45.84 vs cuBLAS 50.03 → 92%
#   LMHead kernel 95.07 vs cuBLAS 90.69 → 105%
# Original 1.30 target was set against a weak CUTLASS reference; vs cuBLAS
# at M=16 it is physically unrealistic. 1.10 is aggressive but achievable
# on shapes where residual fusion or cg2 swapab can give a real edge.
configs:
  - name: QKV
    args: { M: 16, N: 6144, K: 4096, residual: false }
    target_ratio: 1.10
    weight: 1.0

  - name: O
    args: { M: 16, N: 4096, K: 4096, residual: true }
    target_ratio: 1.10
    weight: 1.0

  - name: GateUp
    args: { M: 16, N: 24576, K: 4096, residual: false }
    target_ratio: 1.10
    weight: 1.0

  - name: Down
    args: { M: 16, N: 4096, K: 12288, residual: true }
    target_ratio: 1.10
    weight: 1.0

  - name: LMHead
    args: { M: 16, N: 153600, K: 4096, residual: false }
    target_ratio: 1.10
    weight: 1.0

# min_ratio: every config must clear its target — one straggler fails the
# whole task. Weighted_avg would let a big win on LMHead mask a loss
# on O, which would be dishonest.
scoring: min_ratio

stage_gate:
  ratio: 0.9
  strict: false

constraints:
  - "Single CUDA stream only — kernel runs inside a framework managing its own streams. No cudaStreamCreate, no cudaEventRecord overlap."
  - "No CUDA graphs."
  - "cta_group::1 only — deployment framework does not support cluster launch (cta_group::2)."
  - "Output bit-compatible with the CUTLASS baseline: max relative error < 5e-3 across all 5 configs."
  - "Residual fusion is in-kernel epilogue only — no separate add kernel for O/Down."

budget:
  max_iterations: 60
  max_wall_minutes: 120

output:
  result_format: kernel_result_json
  result_keys: [QKV, O, GateUp, Down, LMHead]
